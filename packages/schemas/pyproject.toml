[project]
name = "schemas"
version = "0.1.0"
description = "Shared Pydantic schemas for A Step Forward (memory, graph, curriculum, agents, errors)."
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.7",
  "pydantic-settings>=2.4",
  "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["schemas"]
