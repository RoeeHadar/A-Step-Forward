[project]
name = "agents"
version = "0.1.0"
description = "Runtime AI agents for A Step Forward (LangGraph-based)."
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.7",
  "pydantic-settings>=2.4",
  "anthropic>=0.34",
  "openai>=1.40",
  "instructor>=1.4",
  "langgraph>=0.2",
  "httpx>=0.27",
  "structlog>=24.1",
  "tenacity>=8.3",
  "schemas",
]

[tool.uv.sources]
schemas = { path = "../schemas", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agents"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
