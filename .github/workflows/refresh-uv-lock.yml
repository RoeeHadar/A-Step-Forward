name: Refresh uv.lock

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/pyproject.toml'
      - '.github/workflows/refresh-uv-lock.yml'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.4.10"

      - name: Lock dependencies
        run: uv lock

      - name: Commit lockfile if changed
        run: |
          if [[ -n "$(git status --porcelain uv.lock)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add uv.lock
            git commit -m "chore(deps): refresh uv.lock after pyproject.toml change"
            git push
          else
            echo "uv.lock already in sync"
          fi
