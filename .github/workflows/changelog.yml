name: Changelog

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Open changelog PR
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "docs(changelog): refresh from git-cliff"
          title: "docs(changelog): refresh from git-cliff"
          branch: bot/changelog
          delete-branch: true
          body: |
            Auto-generated by `.github/workflows/changelog.yml` after a `v*` tag.

            Squash-merge after review.
          base: main
          add-paths: |
            CHANGELOG.md
