name: Lint & Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: lint-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: astepforward
          POSTGRES_USER: astepforward
          POSTGRES_PASSWORD: astepforward
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U astepforward"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+asyncpg://astepforward:astepforward@localhost:5432/astepforward
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check infra tests scripts

      - name: Ruff format (check)
        run: uv run ruff format --check infra tests scripts

      - name: Mypy (infra)
        run: uv run mypy

      - name: Alembic upgrade head
        run: uv run alembic -c infra/alembic.ini upgrade head

      - name: API import smoke (matches Render Docker startup)
        run: |
          uv run --package asf-api python -c "
          from app.main import app
          from learner_model_service.api import get_learner_model_service
          from diagnostic_service.api import get_diagnostic_service
          from learning_path_service.api import get_learning_path_service
          assert app.title
          get_learner_model_service
          get_diagnostic_service
          get_learning_path_service
          "

      - name: Learning path unit tests
        run: uv run --package learning-path-service pytest -q

      - name: Pytest
        run: uv run pytest tests

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile || pnpm install

      - name: ESLint
        run: pnpm --filter @asf/web lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Schema TS tests
        run: pnpm --filter @asf/schemas test:ts

      - name: Vitest
        working-directory: apps/web
        run: pnpm exec vitest run --exclude 'src/lib/schemas.test.ts'
