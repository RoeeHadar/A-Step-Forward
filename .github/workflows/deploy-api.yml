name: Deploy API (Fly.io)

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "services/**"
      - "infra/fly/asf-api.toml"
      - "infra/alembic/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Migration gate reminder
        run: |
          uv sync --all-groups
          echo "Schema/model changes must ship Alembic revisions in the same release."

  deploy-staging:
    needs: [migrate-check]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sync secrets from Doppler
        uses: dopplerhq/cli-action@v3
        with:
          token: ${{ secrets.DOPPLER_TOKEN }}
          project: a-step-forward
          config: stg

      - name: Deploy asf-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::notice::Skipping Fly.io deploy — FLY_API_TOKEN not set (Render is primary)."
            exit 0
          fi
          flyctl deploy --config infra/fly/asf-api.toml --remote-only

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run migrations (staging)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ -z "$FLY_API_TOKEN" ] || [ -z "$DATABASE_URL" ]; then
            echo "::notice::Skipping staging migrations — Fly/DB secrets not configured."
            exit 0
          fi
          uv run alembic -c infra/alembic.ini upgrade head
