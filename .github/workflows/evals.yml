name: Evals

on:
  pull_request:
    paths:
      - "prompts/**"
      - "packages/agents/**"
      - "evals/**"
      - ".github/workflows/evals.yml"
  push:
    branches: [main]
    paths:
      - "prompts/**"
      - "packages/agents/**"
      - "evals/**"

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tutor-promptfoo:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: promptfoo eval â€” tutor capability
        run: npx --yes promptfoo@latest eval -c evals/agents/tutor/capability.yaml --no-progress-bar

      - name: promptfoo eval â€” tutor safety
        run: npx --yes promptfoo@latest eval -c evals/agents/tutor/safety.yaml --no-progress-bar

      - name: Report tutor thresholds
        if: always()
        run: |
          echo "Tutor eval thresholds (evals/agents/tutor/thresholds.yaml):"
          cat evals/agents/tutor/thresholds.yaml

      - name: Upload eval report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: promptfoo-tutor-report
          path: |
            ~/.promptfoo/output
          if-no-files-found: ignore
