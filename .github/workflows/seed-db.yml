name: Seed DB (one-shot)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which seed to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - diagnostic
          - knowledge-graph
          - content-json
          - external-resources
          - concept-explanations
          - fix-hebrew-content
          - content-from-export

jobs:
  seed:
    name: Run seed scripts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.11"

      - name: Install workspace deps
        run: uv sync --all-packages --no-dev

      - name: Install psycopg for import script
        if: ${{ inputs.target == 'all' || inputs.target == 'content-json' }}
        run: uv pip install psycopg[binary]

      - name: Seed diagnostic_items
        if: ${{ inputs.target == 'all' || inputs.target == 'diagnostic' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run python scripts/seed_diagnostic_items.py

      - name: Seed knowledge graph (Neo4j)
        if: ${{ inputs.target == 'all' || inputs.target == 'knowledge-graph' }}
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USER }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE }}
          USE_NEO4J: "true"
        run: uv run python scripts/seed_knowledge_graph.py

      - name: Import content JSON to Neon
        if: ${{ inputs.target == 'all' || inputs.target == 'content-json' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -f scripts/seed_data/content_export.json ]; then
            pip install psycopg[binary] -q
            python scripts/import_content_json.py --input scripts/seed_data/content_export.json
          else
            echo "No scripts/seed_data/content_export.json found — skipping."
          fi

      - name: Setup Node (for external resources seed)
        if: ${{ inputs.target == 'all' || inputs.target == 'external-resources' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Seed external_resources
        if: ${{ inputs.target == 'all' || inputs.target == 'external-resources' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm install --no-save --no-package-lock js-yaml @neondatabase/serverless
          node scripts/seed-external-resources.mjs

      - name: Scrape concept explanations (Wikipedia EN + HE)
        if: ${{ inputs.target == 'all' || inputs.target == 'concept-explanations' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm install --no-save --no-package-lock js-yaml @neondatabase/serverless
          node scripts/scrape-concept-content.mjs

      - name: Fix Hebrew content (reverse visual-order rows in content_sections)
        if: ${{ inputs.target == 'fix-hebrew-content' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm install --no-save --no-package-lock @neondatabase/serverless
          node scripts/fix-hebrew-content.mjs

      - name: Seed content_sections + bagrut from JSON export
        if: ${{ inputs.target == 'content-from-export' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm install --no-save --no-package-lock @neondatabase/serverless
          ls -lah scripts/seed_data/content_export.json
          node scripts/seed-content-from-export.mjs --input=scripts/seed_data/content_export.json
