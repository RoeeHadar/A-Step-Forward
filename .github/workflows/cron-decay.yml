name: Cron — Decay sweep (weekly)

on:
  schedule:
    # 04:00 UTC every Sunday
    - cron: "0 4 * * 0"
  workflow_dispatch:

concurrency:
  group: cron-decay
  cancel-in-progress: false

jobs:
  decay:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install worker dependencies (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/schemas
          pip install -e services/memory
          pip install -e services/graphrag
          pip install -e services/workers

      - name: Run decay sweep job
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m workers.jobs.decay
