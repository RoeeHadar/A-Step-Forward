name: Repo Health

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: repo-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  required-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify governance files exist
        run: |
          missing=0
          for f in README.md LICENSE SECURITY.md CHANGELOG.md CONTRIBUTING.md \
                   docs/adr/README.md cliff.toml; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then exit 1; fi

      - name: Verify LICENSE is MIT
        run: |
          grep -q "MIT License" LICENSE || {
            echo "::error::LICENSE must be MIT (per RESUME-README locked decisions)."
            exit 1
          }

      - name: Verify SECURITY.md has reporting contact
        run: |
          grep -Eqi "security@|\[security\]|report" SECURITY.md || {
            echo "::error::SECURITY.md must include a reporting contact."
            exit 1
          }

  conventional-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title is conventional
        uses: amannn/action-semantic-pull-request@v5
        with:
          types: |
            feat
            fix
            refactor
            perf
            docs
            test
            chore
            build
            ci
            eval
            revert
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
