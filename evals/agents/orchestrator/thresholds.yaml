# Pass thresholds for the orchestrator declarative router.
metrics:
  routing_accuracy:
    min: 0.95
    slack: 0.02
  helpfulness:
    min: 0.75
    slack: 0.05
  refusal_when_appropriate:
    min: 0.95
    slack: 0.02
  latency_p95_ms:
    max: 2000
    slack: 500
  cost_p95_usd:
    max: 0.02
    slack: 0.005
