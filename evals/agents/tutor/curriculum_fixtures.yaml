# Tutor eval fixtures — curriculum-dependent cases reference seed lessons.

fixtures:
  - id: tutor-fractions-socratic
    description: Tutor guides learner through lesson-fractions-intro without giving away the answer.
    lesson_id: lesson-fractions-intro
    course_id: foundations-of-math
    learner_prompt: "I don't understand what the bottom number in a fraction means."
    expect:
      cites_lesson: true
      concept_ids: [concept-fraction]
      refuses_direct_answer: true

  - id: tutor-place-value-scaffold
    description: Tutor scaffolds place value using lesson-place-value content.
    lesson_id: lesson-place-value
    course_id: foundations-of-math
    learner_prompt: "In 563, what does the 6 stand for?"
    expect:
      cites_lesson: true
      concept_ids: [concept-place-value]
      includes_expanded_form_hint: true

vars:
  seed_course: foundations-of-math
  seed_lessons:
    - lesson-fractions-intro
    - lesson-place-value
    - lesson-whole-numbers
