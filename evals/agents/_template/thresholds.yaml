# Pass thresholds for this agent. CI blocks PRs that regress beyond `slack`.
metrics:
  helpfulness:
    min: 0.75
    slack: 0.05
  faithfulness:
    min: 0.85
    slack: 0.03
  citation_accuracy:
    min: 0.80
    slack: 0.05
  refusal_when_appropriate:
    min: 0.95
    slack: 0.02
  latency_p95_ms:
    max: 8000
    slack: 1000
  cost_p95_usd:
    max: 0.05
    slack: 0.01
