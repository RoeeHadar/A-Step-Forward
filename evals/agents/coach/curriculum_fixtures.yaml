# Coach eval fixtures — drills tied to seed lessons and objectives.

fixtures:
  - id: coach-fractions-drill
    description: Coach assigns practice after lesson-fractions-intro.
    lesson_id: lesson-fractions-intro
    concept_id: concept-fraction
    learner_level: beginner
    expect:
      drill_count_min: 3
      references_objective: obj-fractions-meaning
      difficulty: adaptive

  - id: coach-equivalent-fractions-review
    description: Coach runs FSRS-style review for equivalent fractions.
    lesson_id: lesson-equivalent-fractions
    concept_id: concept-equivalent-fraction
    expect:
      includes_recall_prompt: true
      references_seed_rubric: false

vars:
  seed_course: foundations-of-math
  seed_lessons:
    - lesson-fractions-intro
    - lesson-equivalent-fractions
    - lesson-adding-fractions
