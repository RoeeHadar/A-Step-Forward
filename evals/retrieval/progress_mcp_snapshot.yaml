description: Progress MCP tool eval — snapshot returns learner mastery summary shape.
providers:
  - id: echo
tests:
  - description: progress.snapshot includes learner_id and mastery array
    vars:
      tool: progress.snapshot
      input:
        learner_id: learner-fixture-1
    assert:
      - type: javascript
        value: |
          const body = JSON.parse(output);
          return body.learner_id === 'learner-fixture-1' && Array.isArray(body.mastery);
