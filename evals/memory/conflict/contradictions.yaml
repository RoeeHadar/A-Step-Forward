# Conflict resolution eval — contradictions must produce superseded_by

cases:
  - existing: "Learner prefers morning study sessions."
    incoming: "Learner does not prefer morning study sessions."
    expect_supersession: true

  - existing: "Learner is working on fractions."
    incoming: "Learner asked for a long division example."
    expect_supersession: false

thresholds:
  pass_rate: 1.0
