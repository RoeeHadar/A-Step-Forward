# Consolidation eval — near-duplicates merge without silent overwrite

cases:
  - a: "Learner likes visual proofs in geometry."
    b: "Learner likes visual proofs for geometry problems."
    min_similarity: 0.5
    expect_merge: true

  - a: "Learner prefers cats."
    b: "Learner is studying algebra."
    min_similarity: 0.5
    expect_merge: false

thresholds:
  pass_rate: 1.0
