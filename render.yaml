services:
  - type: web
    name: asf-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    branch: main
    envVars:
      - key: APP_ENV
        value: staging
      - key: DATABASE_URL
        sync: false  # set manually: Neon connection string
      - key: REDIS_URL
        sync: false  # set manually from Upstash
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: CLERK_JWKS_URL
        sync: false  # e.g. https://<clerk-domain>/.well-known/jwks.json
      - key: CLERK_ISSUER
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: BOOKING_API_SECRET
        sync: false
    healthCheckPath: /healthz
    autoDeploy: true
    # Only redeploy on changes that actually affect the API image.
    # Without this filter, Vercel-only commits (apps/web changes) trigger
    # Render rebuilds, which on free tier sometimes exceed the deploy
    # health-check window and show as false "deploy failed" emails even
    # though the previous image is still serving traffic.
    buildFilter:
      paths:
        - apps/api/**
        - packages/agents/**
        - packages/schemas/**
        - services/**
        - infra/alembic/**
        - pyproject.toml
        - uv.lock
        - render.yaml
