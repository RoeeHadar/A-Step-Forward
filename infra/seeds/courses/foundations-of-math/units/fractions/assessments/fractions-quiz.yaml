id: assessment-fractions-quiz
type: quiz
title: Fractions Check-In
rubric: |
  Score 1 point per correct answer. Mastery is 3/4 or higher.
  Short answers require correct reasoning about numerators and denominators.
concepts: [concept-fraction, concept-equivalent-fraction, concept-fraction-operations]
questions:
  - id: q-frac-mcq-1
    stem: In 5/6, what does the 6 represent?
    type: mcq
    choices: ["Parts you have", "Equal parts in the whole", "The sum", "A decimal"]
    answer: "Equal parts in the whole"
    rubric: Full credit for denominator meaning.
    concepts: [concept-fraction]
  - id: q-frac-mcq-2
    stem: Which fraction is equivalent to 2/3?
    type: mcq
    choices: ["4/6", "2/6", "3/2", "1/3"]
    answer: "4/6"
    rubric: Full credit for 4/6.
    concepts: [concept-equivalent-fraction]
  - id: q-frac-short-1
    stem: Compute 3/10 + 2/10.
    type: short
    answer: "5/10"
    rubric: Accept 1/2 if simplified with work shown.
    concepts: [concept-fraction-operations]
  - id: q-frac-essay-1
    stem: Explain why 1/4 and 2/8 represent the same amount.
    type: essay
    rubric: |
      2 points: states same part-whole relationship.
      1 point: mentions multiplying numerator and denominator by same value.
    concepts: [concept-equivalent-fraction]
