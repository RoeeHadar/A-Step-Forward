id: assessment-decimals-percent-quiz
type: quiz
title: Decimals and Percent Check-In
rubric: |
  Score 1 point per correct answer. Mastery is 3/4 or higher.
concepts: [concept-decimal, concept-percent]
questions:
  - id: q-dp-mcq-1
    stem: Which decimal equals 3/10?
    type: mcq
    choices: ["0.03", "0.3", "3.0", "0.13"]
    answer: "0.3"
    rubric: Full credit for 0.3.
    concepts: [concept-decimal]
  - id: q-dp-mcq-2
    stem: What is 25% as a decimal?
    type: mcq
    choices: ["0.025", "0.25", "2.5", "25.0"]
    answer: "0.25"
    rubric: Full credit for 0.25.
    concepts: [concept-percent]
  - id: q-dp-short-1
    stem: Write 0.6 as a fraction in simplest form.
    type: short
    answer: "3/5"
    rubric: Accept 6/10 if simplified to 3/5.
    concepts: [concept-decimal, concept-fraction]
  - id: q-dp-short-2
    stem: Convert 50% to a fraction in simplest form.
    type: short
    answer: "1/2"
    rubric: Full credit for 1/2.
    concepts: [concept-percent]
