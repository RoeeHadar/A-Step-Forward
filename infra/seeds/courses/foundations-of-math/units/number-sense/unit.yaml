id: number-sense
title: Number Sense
summary: Understand whole numbers, place value, and how to compare quantities.
objectives:
  - id: obj-ns-read-numbers
    statement: Read and write whole numbers up to 1,000.
    blooms_level: remember
    concepts: [concept-whole-number, concept-place-value]
  - id: obj-ns-compare
    statement: Compare two whole numbers using greater than, less than, or equal to.
    blooms_level: apply
    concepts: [concept-comparing-numbers]
lessons:
  - whole-numbers
  - place-value
  - comparing-numbers
assessments:
  - number-sense-quiz
