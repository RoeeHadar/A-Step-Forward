id: assessment-number-sense-quiz
type: quiz
title: Number Sense Check-In
rubric: |
  Score 1 point per correct answer. Mastery is 3/4 or higher.
  Partial credit on short answers when place-value reasoning is clear.
concepts: [concept-whole-number, concept-place-value, concept-comparing-numbers]
questions:
  - id: q-ns-mcq-1
    stem: Which number is a whole number?
    type: mcq
    choices: ["-2", "0.5", "7", "1/2"]
    answer: "7"
    rubric: Full credit for selecting 7.
    concepts: [concept-whole-number]
  - id: q-ns-mcq-2
    stem: In 563, what value does the digit 6 represent?
    type: mcq
    choices: ["6", "60", "600", "63"]
    answer: "60"
    rubric: Full credit for 60 (tens place).
    concepts: [concept-place-value]
  - id: q-ns-short-1
    stem: Write 294 in expanded form.
    type: short
    answer: "200 + 90 + 4"
    rubric: Accept equivalent orderings; all place values must be correct.
    concepts: [concept-place-value]
  - id: q-ns-short-2
    stem: Compare 407 and 470 using >, <, or =.
    type: short
    answer: "407 < 470"
    rubric: Accept symbol alone if correct; explanation optional.
    concepts: [concept-comparing-numbers]
