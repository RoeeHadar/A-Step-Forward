concepts:
  - id: concept-whole-number
    name: Whole Number
    summary: Counting numbers and zero used to describe quantity.
  - id: concept-place-value
    name: Place Value
    summary: The value of a digit depends on its position in a number.
    prerequisites: [concept-whole-number]
  - id: concept-comparing-numbers
    name: Comparing Numbers
    summary: Determining which quantity is greater, less, or equal.
    prerequisites: [concept-whole-number]
  - id: concept-fraction
    name: Fraction
    summary: A number that represents parts of a whole.
    prerequisites: [concept-whole-number]
  - id: concept-equivalent-fraction
    name: Equivalent Fraction
    summary: Different fractions that name the same amount.
    prerequisites: [concept-fraction]
  - id: concept-fraction-operations
    name: Fraction Operations
    summary: Adding and subtracting fractions with like denominators.
    prerequisites: [concept-equivalent-fraction]
  - id: concept-decimal
    name: Decimal
    summary: Numbers written with a decimal point to show parts of a whole.
    prerequisites: [concept-fraction]
  - id: concept-percent
    name: Percent
    summary: A ratio out of 100, often used to compare parts to wholes.
    prerequisites: [concept-decimal]
