# Fly.io app config — FastAPI gateway (staging/production).
# See docs/infra/ci-cd.md and skills/deploy/SKILL.md.

app = "asf-api"
primary_region = "iad"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  APP_ENV = "staging"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/readyz"
    timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
