app = "asf-memory"
primary_region = "iad"

[build]
  dockerfile = "services/memory/Dockerfile"

[env]
  APP_ENV = "staging"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8101
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
