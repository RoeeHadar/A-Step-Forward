  - id: uni_rigid_body
    name: Rigid Body Dynamics
    name_he: דינמיקת גוף קשיח
    prerequisites: [uni_momentum, uni_vectors]

  - id: uni_oscillations
    name: Oscillations & Waves
    name_he: תנודות וגלים
    prerequisites: [uni_newtonian_mechanics, uni_work_energy]

  - id: uni_fluids
    name: Fluid Mechanics
    name_he: מכניקת זורמים
    prerequisites: [uni_newtonian_mechanics, uni_work_energy]

  - id: uni_thermodynamics
    name: Thermodynamics
    name_he: תרמודינמיקה
