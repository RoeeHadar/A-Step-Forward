  - id: uni_optics
    name: Wave Optics
    name_he: אופטיקת גלים
    prerequisites: [uni_em_waves, uni_oscillations]

  - id: uni_quantum_intro
    name: Introduction to Quantum Mechanics
    name_he: מבוא למכניקת הקванטים
    prerequisites: [uni_oscillations, uni_em_waves]
