# University Math (Calculus 1, Linear Algebra) prerequisite graph
subject: math
level: university
concepts:
  - id: uni_functions_review
    name: Functions & Pre-Calculus Review
    name_he: פונקציות וחזרה על פרה-חשבון
    prerequisites: []

  - id: uni_limits
    name: Limits & Continuity
    name_he: גבולות ורציפות
    prerequisites: [uni_functions_review]

  - id: uni_derivatives
    name: Derivatives
    name_he: נגזרות
    prerequisites: [uni_limits]

  - id: uni_derivative_applications
    name: Applications of Derivatives
    name_he: יישומי נגזרות
    prerequisites: [uni_derivatives]

  - id: uni_integrals
    name: Integrals
    name_he: אינטגרלים
    prerequisites: [uni_derivatives]

  - id: uni_integration_techniques
    name: Integration Techniques
    name_he: שיטות אינטגרציה
    prerequisites: [uni_integrals]

  - id: uni_applications_integrals
    name: Applications of Integrals
    name_he: יישומי אינטגרלים
    prerequisites: [uni_integration_techniques]

  - id: uni_sequences_series
    name: Sequences & Series
    name_he: סדרות וטורים
    prerequisites: [uni_limits, uni_integrals]

  - id: uni_multivariable
    name: Multivariable Calculus
    name_he: חשבון רב-משתני
    prerequisites: [uni_derivatives, uni_integrals]

  - id: uni_partial_derivatives
    name: Partial Derivatives
    name_he: נגזרות חלקיות
    prerequisites: [uni_multivariable]

  - id: uni_multiple_integrals
    name: Multiple Integrals
    name_he: אינטגרלים מרובים
    prerequisites: [uni_partial_derivatives, uni_integration_techniques]

  - id: uni_vector_fields
    name: Vector Fields
    name_he: שדות וקטוריים
    prerequisites: [uni_multivariable]

  - id: uni_line_integrals
    name: Line & Surface Integrals
    name_he: אינטגרלי קו ומשטח
    prerequisites: [uni_vector_fields, uni_multiple_integrals]

  - id: la_vectors
    name: Vectors in R^n
    name_he: וקטורים ב-R^n
    prerequisites: [uni_functions_review]

  - id: la_matrices
    name: Matrices & Linear Systems
    name_he: מטריצות ומערכות לינאריות
    prerequisites: [la_vectors]

  - id: la_determinants
    name: Determinants
    name_he: דטרמיננטות
    prerequisites: [la_matrices]

  - id: la_vector_spaces
    name: Vector Spaces
    name_he: מרחבי וקטורים
    prerequisites: [la_matrices, la_vectors]

  - id: la_eigenvalues
    name: Eigenvalues & Eigenvectors
    name_he: ערכים ווקטורים עצמיים
    prerequisites: [la_determinants, la_vector_spaces]

  - id: la_orthogonality
    name: Orthogonality & Least Squares
    name_he: ישרות וריבועים פחותים
    prerequisites: [la_vector_spaces, la_eigenvalues]

  - id: la_diagonalization
    name: Matrix Diagonalization
    name_he: אלכסון מטריצות
    prerequisites: [la_eigenvalues]
